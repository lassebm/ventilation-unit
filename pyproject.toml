[tool.ruff]
required-version = ">=0.5.0"
target-version = "py311"

[tool.ruff.lint]
select = [
    "B", "BLE", "C4", "DTZ", "E", "EXE", "F", "FA", "FLY", "FURB", "G", "I",
    "ICN", "ISC", "LOG", "NPY", "PERF", "PGH", "PIE", "PL", "PTH", "PYI", "Q",
    "RSE", "SIM", "SLOT", "RET", "T10", "UP", "W", "YTT",
]
ignore = [
    "E501", "PLC0415", "PLR0911", "PLR0912", "PLR0913", "PLR0915", "PLW1641",
    "PLR2004", "PLW2901",
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["esphome"]
combine-as-imports = true
split-on-trailing-comma = false
